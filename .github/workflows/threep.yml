name: Send 3P Reminder

on:
  schedule:
    - cron: "0 16 * * 3,6"
      timezone: "Asia/Jakarta"
  workflow_dispatch:

jobs:
  send-threep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reminder dependencies
        run: pip install discord.py python-dotenv

      - name: Send 3P reminder
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          REMINDER_CHANNEL_ID: ${{ secrets.REMINDER_CHANNEL_ID }}
          BOT_TIMEZONE: ${{ vars.BOT_TIMEZONE || 'Asia/Jakarta' }}
          THREE_P_ROLE_MENTION: ${{ secrets.THREE_P_ROLE_MENTION }}
          KELOMPOK6_ROLE_MENTION: ${{ secrets.KELOMPOK6_ROLE_MENTION }}
          COMMAND_PREFIX: ${{ vars.COMMAND_PREFIX || '!' }}
        run: python send_reminder.py 3p
